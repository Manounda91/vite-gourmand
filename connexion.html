<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vite & Gourmand - Connexion</title>
    <link rel="stylesheet" href="style-connexion.css">
</head>
<body>

<div class="login-card">
    <h2>Espace Personnel</h2>
    <p class="subtitle">Vite & Gourmand — Administration</p>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Adresse Email</label>
            <input type="email" id="email" required placeholder="jose@vitegourmand.fr">
        </div>
        
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" required placeholder="••••••••">
        </div>
        
        <button type="submit" id="btnSubmit" class="btn-submit">Se connecter</button>
    </form>
    
    <div id="msgBox" class="message"></div>
</div>

<script src="auth.js"></script>
</body>
</html>
